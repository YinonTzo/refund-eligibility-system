services:
  refundeligibilitysystem:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
    ports:
      - "8080:8080"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/home/app/.microsoft/usersecrets:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ./RefundEligibilitySystem.Infrastructure/Scripts/:/app/Database/Scripts
    depends_on:
        sqlserver:
          condition: service_healthy

  refund-client:
    environment:
      - VITE_API_URL=http://localhost:8080

  sqlserver:
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=passw0rd!
    ports:
      - "1433:1433"
    healthcheck:
        test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "passw0rd!", "-Q", "SELECT 1", "-No"]
        interval: 10s
        timeout: 5s
        retries: 8
        start_period: 20s
